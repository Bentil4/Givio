<label class="form-row" [for]="checkboxId()">
  <input
    type="checkbox"
    class="cb-hidden"
    [id]="checkboxId()"
    [checked]="checked()"
    [disabled]="isDisabled()"
    (change)="toggle()"
  />
  <div class="cb-box" [class.checked]="checked()">
    @if (checked()) {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="3"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
    </svg>
    }
  </div>
  @if (label()) {
  <span>{{ label() }}</span>
  }
  <ng-content />
</label>
